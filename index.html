<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVI Converter</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="container">

<h1>🎬 MP4 → AVI</h1>
<p class="subtitle">FFmpeg ejecutándose dentro del navegador</p>

<div id="dropZone">
    <p>📦 Arrastra videos aquí</p>
    <p>o</p>
    <input type="file" id="files" multiple accept="video/mp4">
</div>

<button id="convertBtn">Convertir Videos</button>

<div class="progressBox">
    <div id="progressBar"></div>
</div>

<div id="status">Esperando archivos...</div>

<div id="console"></div>

</div>

<script src="script.js"></script>
</body>
</html>
